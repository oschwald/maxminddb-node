name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20.x
          - os: ubuntu-latest
            node-version: 22.x
          - os: ubuntu-latest
            node-version: 24.x
          - os: macos-15-intel
            node-version: 24.x
          - os: windows-2025
            node-version: 24.x

    defaults:
      run:
        working-directory: maxmind-rs

    steps:
      - name: Checkout maxmind-rs
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: maxmind-rs
          persist-credentials: false

      - name: Checkout MaxMind DB Rust test data
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: oschwald/maxminddb-rust
          path: maxminddb-rust
          submodules: recursive
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: maxmind-rs/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install dependencies
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Check Rust
        run: cargo check

      - name: Lint Rust
        run: cargo clippy --all-targets -- -D warnings

      - name: Build native module
        run: npm run build

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Check npm package
        run: npm pack --dry-run

      - name: Test packed package
        run: npm run test:pack
