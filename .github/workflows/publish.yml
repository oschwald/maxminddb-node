name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Use current npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Check Rust
        run: cargo check

      - name: Build native module
        run: npm run build

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Check npm package
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish
