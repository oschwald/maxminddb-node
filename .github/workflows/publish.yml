name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Run npm publish after validation
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x64-gnu
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - artifact: linux-arm64-gnu
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - artifact: darwin-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            macos_deployment_target: "10.13"
          - artifact: darwin-arm64
            os: macos-15
            target: aarch64-apple-darwin
            macos_deployment_target: "11.0"
          - artifact: win32-x64-msvc
            os: windows-2025
            target: x86_64-pc-windows-msvc
          - artifact: win32-arm64-msvc
            os: windows-11-arm
            target: aarch64-pc-windows-msvc

    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Use current npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build native module
        run: npx napi build --target ${{ matrix.target }} --platform --release --no-js --dts native.d.ts

      - name: Smoke test native module
        run: node -e "const pkg = require('./package.json'); const maxminddb = require('./'); if (maxminddb.nativeVersion() !== pkg.version) throw new Error('native version mismatch')"

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: index.*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - build-binaries

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: maxminddb-node

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: maxminddb-node

      - name: Checkout MaxMind DB Rust test data
        uses: actions/checkout@v4
        with:
          repository: oschwald/maxminddb-rust
          path: maxminddb-rust
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: maxminddb-node/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Use current npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Download native modules
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-artifacts
          merge-multiple: true

      - name: Assemble native modules
        run: |
          cp ../native-artifacts/*.node .
          test -f index.linux-x64-gnu.node
          test -f index.linux-arm64-gnu.node
          test -f index.darwin-x64.node
          test -f index.darwin-arm64.node
          test -f index.win32-x64-msvc.node
          test -f index.win32-arm64-msvc.node
          ls -1 *.node

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Check Rust
        run: cargo check

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Check npm package
        run: npm pack --dry-run

      - name: Publish package
        if: ${{ github.event_name == 'release' || inputs.publish }}
        run: npm publish
